<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="utf-8">
    <title>Game Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- BOOTSTRAP ja CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<!-- Pelin tiedot modalissa, lähde https://www.w3schools.com/howto/howto_css_modals.asp -->
<div class="modal fade" id="gameModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-light">

      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="modal-title">Game title</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Exit Modal Window"></button>
      </div>

      <div class="modal-body" id="modal-body">
        Loading...
      </div>

    </div>
  </div>
</div>

<body class="text-light" id="etu">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="index.html">Game Library</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar"
                aria-controls="collapsibleNavbar" aria-expanded="false" aria-label="Open navigation menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- KUVAKARUSELLI -->
    <div id="header-carousel" class="carousel slide" data-bs-ride="carousel">

        <!-- Staattiset karusellikuvat, olisi mahdollista linkittää API:in, mutta käytin testauksen aikana-->
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img class="w-100" src="assets/img/game1.jpg" alt="Cover image of the video game Slay the Spire">
            </div>

            <div class="carousel-item">
                <img class="w-100" src="assets/img/game2.jpg" alt="Cover image of the video game Hollow Knight">
            </div>

            <div class="carousel-item">
                <img class="w-100" src="assets/img/game3.jpg" alt="Cover image of the video game Hollow Knight: Silksong">
            </div>

        </div>

        <button class="carousel-control-prev" data-bs-target="#header-carousel" data-bs-slide="prev" aria-label="Previous image">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" data-bs-target="#header-carousel" data-bs-slide="next" aria-label="Next image">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <div class="container py-5" id="intro">

        <h1 class="text-center mb-4">Welcome to Game Library</h1>

        <p class="lead text-center mb-5">This page was made as a project for learning web development.</p>
        <p class="text-center mb-0">The game data is fetched from the <a href="https://rawg.io" target="_blank" class="text-decoration-none">RAWG API</a>.</p>

    </div>


    <div class="container py-5" id="games">

        <h2 class="text-center mb-5">Popular</h2>

        <div class="row g-4" id="game-list">
            <!-- JSON/API-DATA ILMESTYY TÄNNE game-list ID:n kautta -->
        </div>

    </div>

        <!-- FOOTER -->
    <footer class="text-center py-4">
        <p>&copy; 2026 Game Library. Powered by RAWG API.</p>
        <p><strong><a href="https://rawg.io" target="_blank">RAWG API</a></strong></p>
    </footer>

    <script src="assets/games.js"></script>

</body>

</html>

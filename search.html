<head>
    <meta charset="utf-8">
    <title>Search Games</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- BOOTSTRAP ja CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<!-- Pelin tiedot modalissa, lähde https://www.w3schools.com/howto/howto_css_modals.asp -->
<div class="modal fade" id="gameModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-light">

            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="modal-title">Game title</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="modal-body">
                Loading...
            </div>

        </div>
    </div>
</div>

<body class="text-light">

    <!-- NAVBAR, otettu aikaisemmista tehtävistä mallia -->
    <nav class="navbar navbar-expand-sm navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="index.html">Game Library</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar"
                aria-controls="collapsibleNavbar" aria-expanded="false" aria-label="Avaa valikko">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Search</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HAKUOSIO -->
    <div class="container" id="haku">

        <h1>Search Games</h1>

        <h2>Start by typing the name of a game:</h2>

        <input type="text" id="search-input" class="form-control mb-4" placeholder="Search for a game...">

        <!-- Hakutulokset renderöidään tähän elementtiin, sama kuin etusivulla -->
        <div class="row g-4" id="search-results"></div>

    </div>

    <!-- JS koodit omassa tiedostossaan niin ei tule liikaa bloattia sivuille -->
    <script src="assets/games.js"></script>

    <!-- FOOTER -->
    <footer class="text-center py-4">
        <p>&copy; 2026 Game Library. Powered by RAWG API.</p>
        <p><a href="https://rawg.io" target="_blank" class="text-decoration-none">API</a></p>
    </footer>

</body>

</html>
